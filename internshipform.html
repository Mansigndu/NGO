<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Internship Form</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="min-h-screen bg-gray-100 py-8 px-4 md:py-12 md:px-6">

  <div class="max-w-4xl mx-auto">
     <div class="mb-6">
    <img src="images/ngologo.png" 
         alt="We For A Cause Foundation Logo"
         class="w-32 md:w-50 mx-auto">
  </div>

    <!-- Header -->
    <div class="text-center bg-blue-50 mb-8 md:mb-12">
      <h1 class="text-3xl md:text-4xl font-bold text-gray-900 mb-2">
        Internship Form
      </h1>
      <p class="text-sm md:text-base text-blue-700 font-semibold tracking-wide">
        UPGRADE YOUR SKILLS WITH WE FOR A CAUSE FOUNDATION
      </p>
    </div>

    <!-- Form -->
    <form class="bg-white rounded-lg shadow-lg p-6 md:p-10 space-y-8">

      <!-- Personal Information -->
      <div class="space-y-6">
        <h2 class="text-xl md:text-2xl font-bold text-gray-900">
          Personal Information
        </h2>

        <!-- Name -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6">
          <div>
            <label class="block text-sm font-medium mb-2">
              First Name <span class="text-red-500">*</span>
            </label>
            <input type="text" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500">
          </div>

          <div>
            <label class="block text-sm font-medium mb-2">
              Last Name <span class="text-red-500">*</span>
            </label>
            <input type="text" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500">
          </div>
        </div>

        <!-- Gender -->
        <div>
          <label class="block text-sm font-medium mb-3">
            Gender <span class="text-red-500">*</span>
          </label>
          <div class="space-y-2 md:flex md:gap-6 md:space-y-0">
            <label class="flex items-center gap-2">
              <input type="radio" name="gender" class="w-4 h-4 text-blue-600">
              Male
            </label>
            <label class="flex items-center gap-2">
              <input type="radio" name="gender" class="w-4 h-4 text-blue-600">
              Female
            </label>
            <label class="flex items-center gap-2">
              <input type="radio" name="gender" class="w-4 h-4 text-blue-600">
              Transgender
            </label>
          </div>
        </div>

        <!-- DOB -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 md:gap-6">
          <select class="px-4 py-2 border border-gray-300 rounded-md">
            <option>Month</option>
            <option>January</option>
            <option>February</option>
            <option>March</option>
          </select>

          <select class="px-4 py-2 border border-gray-300 rounded-md">
            <option>Day</option>
            <!-- Days 1-31 -->
            <script>
              for(let i=1;i<=31;i++){
                document.write(`<option>${i}</option>`)
              }
            </script>
          </select>

          <select class="px-4 py-2 border border-gray-300 rounded-md">
            <option>Year</option>
            <script>
              for(let i=2024;i>=1975;i--){
                document.write(`<option>${i}</option>`)
              }
            </script>
          </select>
        </div>

        <!-- Email -->
        <div>
          <label class="block text-sm font-medium mb-2">
            Email <span class="text-red-500">*</span>
          </label>
          <input type="email" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500">
        </div>

        <!-- Phone -->
        <div>
          <label class="block text-sm font-medium mb-2">
            Phone Number <span class="text-red-500">*</span>
          </label>
          <input type="tel" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500">
        </div>
      </div>

      <!-- Address -->
      <div class="space-y-6 pt-6 border-t border-gray-200">
        <h2 class="text-xl md:text-2xl font-bold">Permanent Address</h2>

        <input type="text" placeholder="Street Address"
          class="w-full px-4 py-2 border border-gray-300 rounded-md">

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <input type="text" placeholder="City"
            class="px-4 py-2 border border-gray-300 rounded-md">

          <input type="text" placeholder="State"
            class="px-4 py-2 border border-gray-300 rounded-md">
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <input type="text" placeholder="Zip Code"
            class="px-4 py-2 border border-gray-300 rounded-md">

          <select class="px-4 py-2 border border-gray-300 rounded-md">
            <option>Country</option>
            <option>India</option>
            <option>USA</option>
            <option>UK</option>
          </select>
        </div>
      </div>

      <!-- Education -->
      <div class="space-y-6 pt-6 border-t border-gray-200">
        <h2 class="text-xl md:text-2xl font-bold">Education</h2>

        <input type="text" placeholder="College Name"
          class="w-full px-4 py-2 border border-gray-300 rounded-md">

        <input type="text" placeholder="Specialization"
          class="w-full px-4 py-2 border border-gray-300 rounded-md">
      </div>

      <!-- Availability -->
      <div class="space-y-6 pt-6 border-t border-gray-200">
        <h2 class="text-xl md:text-2xl font-bold">Availability</h2>

        <div class="flex flex-wrap gap-4">
          <label><input type="checkbox" class="mr-2">Monday</label>
          <label><input type="checkbox" class="mr-2">Tuesday</label>
          <label><input type="checkbox" class="mr-2">Wednesday</label>
          <label><input type="checkbox" class="mr-2">Thursday</label>
          <label><input type="checkbox" class="mr-2">Friday</label>
        </div>

        <input type="text" placeholder="Available Hours"
          class="w-full px-4 py-2 border border-gray-300 rounded-md">
      </div>

      <!-- Motivation -->
      <div class="pt-6 border-t border-gray-200">
        <textarea placeholder="Why do you want to intern with us?"
          class="w-full px-4 py-2 border border-gray-300 rounded-md h-32"></textarea>
      </div>

      <!-- Submit -->
      <div class="pt-6 flex justify-end">
        <button type="submit"
          class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-8 rounded-md transition duration-200">
          Submit
        </button>
      </div>

    </form>
  </div>

</body>
</html>
