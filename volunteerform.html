<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Volunteer Registration</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-[#FDFCF8] text-[#2D2D2D] font-sans">
    

  <section class="min-h-screen flex flex-col items-center justify-center py-12 px-4">
    <!-- Logo Image -->
  <div class="mb-6">
    <a href="index.html"><img src="images/ngologo.png" 
         alt="We For A Cause Foundation Logo"
         class="w-32 md:w-50 mx-auto"></a>
  </div>
    
    <div class="w-full max-w-4xl bg-white shadow-xl rounded-2xl p-6 md:p-10 border border-gray-100">

      <!-- Heading -->
      <div class="mb-8 text-center">
        <h2 class="text-3xl md:text-4xl font-bold text-[#2D2D2D]">
          Volunteer Registration
        </h2>
        <p class="text-gray-500 mt-2">
          Be Volunteer with We For A Cause Foundation
        </p>
      </div>

      <form class="space-y-6">

        <!-- Name -->
        <div class="grid md:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium mb-1">First Name *</label>
            <input type="text" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-[#F4A261] focus:outline-none">
          </div>
          <div>
            <label class="block text-sm font-medium mb-1">Last Name *</label>
            <input type="text" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-[#F4A261] focus:outline-none">
          </div>
        </div>

        <!-- Email -->
        <div>
          <label class="block text-sm font-medium mb-1">E-mail *</label>
          <input type="email" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-[#F4A261] focus:outline-none">
        </div>

        <!-- Birth Date -->
        <div class="grid md:grid-cols-3 gap-4">
          <div>
            <label class="block text-sm font-medium mb-1">Month *</label>
            <select class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-[#F4A261] focus:outline-none">
              <option>Select Month</option>
              <option>January</option>
              <option>February</option>
              <option>March</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium mb-1">Day *</label>
            <select class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-[#F4A261] focus:outline-none">
              <option>Select Day</option>
              <option>1</option>
              <option>2</option>
              <option>3</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium mb-1">Year *</label>
            <select class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-[#F4A261] focus:outline-none">
              <option>Select Year</option>
              <option>2000</option>
              <option>2001</option>
              <option>2002</option>
            </select>
          </div>
        </div>

        <!-- Phone -->
        <div class="grid md:grid-cols-3 gap-4">
          <div>
            <label class="block text-sm font-medium mb-1">Area Code *</label>
            <input type="text" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-[#F4A261] focus:outline-none">
          </div>
          <div class="md:col-span-2">
            <label class="block text-sm font-medium mb-1">Phone Number *</label>
            <input type="text" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-[#F4A261] focus:outline-none">
          </div>
        </div>

        <!-- Address Section -->
        <div class="bg-[#FFF4E6] p-6 rounded-xl space-y-4">
          <h3 class="text-lg font-semibold text-[#2D2D2D]">Address *</h3>

          <input type="text" placeholder="Street Address"
            class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-[#F4A261] focus:outline-none">

          <input type="text" placeholder="Street Address Line 2"
            class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-[#F4A261] focus:outline-none">

          <div class="grid md:grid-cols-2 gap-4">
            <input type="text" placeholder="City"
              class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-[#F4A261] focus:outline-none">
            <input type="text" placeholder="State / Province"
              class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-[#F4A261] focus:outline-none">
          </div>

          <div class="grid md:grid-cols-2 gap-4">
            <input type="text" placeholder="Postal / Zip Code"
              class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-[#F4A261] focus:outline-none">
            <select
              class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-[#F4A261] focus:outline-none">
              <option>Select Country</option>
              <option>India</option>
              <option>USA</option>
              <option>UK</option>
            </select>
          </div>
        </div>

        <!-- Volunteer Areas -->
        <div>
          <label class="block font-semibold mb-3">
            Please indicate areas to volunteer according to your skills
          </label>

          <div class="grid md:grid-cols-2 gap-3 text-sm">
            <label class="flex items-center gap-2">
              <input type="checkbox" class="accent-[#F4A261]"> Rescues
            </label>
            <label class="flex items-center gap-2">
              <input type="checkbox" class="accent-[#F4A261]"> Social Media Handler
            </label>
            <label class="flex items-center gap-2">
              <input type="checkbox" class="accent-[#F4A261]"> Community Services
            </label>
            <label class="flex items-center gap-2">
              <input type="checkbox" class="accent-[#F4A261]"> Marketing
            </label>
            <label class="flex items-center gap-2">
              <input type="checkbox" class="accent-[#F4A261]"> Fund Raising
            </label>
            <label class="flex items-center gap-2">
              <input type="checkbox" class="accent-[#F4A261]"> Campaigns
            </label>
            <label class="flex items-center gap-2">
              <input type="checkbox" class="accent-[#F4A261]"> Content Writing
            </label>
            <label class="flex items-center gap-2">
              <input type="checkbox" class="accent-[#F4A261]"> Creative Designing
            </label>
          </div>
        </div>

        <!-- Skills -->
        <div>
          <label class="block font-semibold mb-2">
            Skills you are good at which can help us *
          </label>
          <textarea rows="4"
            class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-[#F4A261] focus:outline-none resize-none"></textarea>
        </div>

        <!-- Submit Button -->
        <div class="text-center pt-4">
          <button type="submit"
            class="bg-[#F4A261] text-white px-8 py-3 rounded-full font-semibold shadow-md hover:bg-[#e76f51] transition duration-300 transform hover:scale-105">
            Submit Form
          </button>
        </div>

      </form>
    </div>

  </section>

</body>
</html>
