<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Donate Now</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#0F4C5C] min-h-screen">

<!-- Donation Section -->
<section class="flex items-center justify-center px-4 py-12">

<div class="bg-white w-full max-w-2xl p-6 md:p-10 rounded-2xl shadow-xl">

<h2 class="text-2xl md:text-3xl font-bold text-center text-[#F4A261] mb-4">
Make a Donation ❤️ <br>
 
</h2>
<p class="text-sm text-gray-500 mb-4 text-center">
  Fields marked with <span class="text-red-500">*</span> are required
</p>




<p class="text-center text-gray-600 mb-8 text-sm md:text-base">
Your contribution helps us provide food, shelter, and medical care for animals in need.
</p>

<form action="#" method="POST" class="space-y-5">

<!-- Full Name -->
<div>
<label class="block mb-1 font-medium text-gray-700">
Full Name 
</label>

<input type="text" required
class="w-full border border-gray-300 p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">
</div>

<!-- Email -->
<div>
<label class="block mb-1 font-medium text-gray-700">
Email Address 
</label>

<input type="email" required
class="w-full border border-gray-300 p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">
</div>

<!-- PAN -->
<div>
<label class="block mb-1 font-medium text-gray-700">
PAN Number <span class="text-red-500">*</span>
</label>

<input 
type="text" 
required
pattern="[A-Z]{5}[0-9]{4}[A-Z]{1}"
title="Enter valid PAN (Example: ABCDE1234F)"
class="w-full border border-gray-300 p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">
</div>

<!-- Aadhaar -->
<div>
<label class="block mb-1 font-medium text-gray-700">
Aadhaar Number
</label>

<input 
type="text" 
required
pattern="[0-9]{12}" 
title="Enter valid 12 digit Aadhaar number"
class="w-full border border-gray-300 p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">
</div>

<!-- Amount Preset -->
<div>

<label class="block mb-2 font-medium text-gray-700">
Select Amount 
</label>

<div class="grid grid-cols-3 gap-3 mb-3 text-center">

<button type="button" onclick="setAmount(500)"
class="border py-2 rounded-lg hover:bg-blue-100 transition">
₹500
</button>

<button type="button" onclick="setAmount(1000)"
class="border py-2 rounded-lg hover:bg-blue-100 transition">
₹1000
</button>

<button type="button" onclick="setAmount(2500)"
class="border py-2 rounded-lg hover:bg-blue-100 transition">
₹2500
</button>

</div>

<input type="number" id="amount" placeholder="Enter Custom Amount (₹)" required
class="w-full border border-gray-300 p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">

</div>

<!-- Donation Type -->
<div>

<label class="block mb-2 font-medium text-gray-700">
Donation Type
</label>

<div class="flex gap-6">

<label class="flex items-center gap-2">
<input type="radio" name="donationType" checked>
One-Time
</label>

<label class="flex items-center gap-2">
<input type="radio" name="donationType">
Monthly
</label>

</div>

</div>

<!-- Submit Button -->
<button type="submit"
class="w-full bg-[#F4A261] hover:bg-[#e08c4a] text-white py-3 rounded-lg 
font-semibold shadow-md hover:scale-105 transition duration-300">
Proceed to Pay
</button>

</form>

</div>

</section>

<!-- Script -->
<script>

function setAmount(value) {
document.getElementById('amount').value = value;
}

</script>

</body>
</html>
